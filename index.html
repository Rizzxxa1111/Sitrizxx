<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raizzx Panel</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: #020202;
      overflow-x: hidden;
      font-family: sans-serif;
    }

    .snow {
      position: fixed;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from {
        transform: translateY(-10px);
      }
      to {
        transform: translateY(100vh);
      }
    }

    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body class="text-white">

  <!-- NEVE -->
  <div id="snow-container"></div>

  <!-- BARRA -->
  <div class="fixed top-0 left-0 right-0 bg-purple-600 py-2 text-center text-xs font-bold uppercase tracking-widest z-50">
    🚀 Portal Raizzx Ativo!
  </div>

  <!-- NAVBAR -->
  <nav class="fixed top-8 left-0 right-0 z-40 border-b border-white/10 bg-black/70 backdrop-blur-xl">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center font-black">
          R
        </div>

        <span class="font-black uppercase italic">
          Raizzx
        </span>
      </div>

      <button class="bg-white/5 p-2 rounded-lg hover:bg-white/10">
        <i data-lucide="settings"></i>
      </button>

    </div>
  </nav>

  <!-- CONTEUDO -->
  <main class="pt-32 pb-20 px-6">

    <!-- PERFIL -->
    <section class="max-w-2xl mx-auto text-center">

      <img
        src="https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx"
        class="w-36 h-36 mx-auto rounded-full border-4 border-purple-600 shadow-2xl"
      >

      <h1 class="text-5xl font-black mt-8 italic">
        Raizzx
      </h1>

      <p class="text-gray-400 mt-3 text-lg">
        Full-Stack Developer
      </p>

    </section>

    <!-- LINKS -->
    <section class="max-w-xl mx-auto mt-16 space-y-5">

      <a href="#"
        class="glass rounded-3xl p-6 flex items-center justify-between hover:scale-[1.02] transition-all duration-300">
        
        <div>
          <h2 class="font-black text-lg uppercase italic">
            Portfólio
          </h2>

          <p class="text-gray-500 text-sm">
            Acessar projeto
          </p>
        </div>

        <i data-lucide="external-link"></i>

      </a>

      <a href="https://www.instagram.com/pvdraizz01"
        target="_blank"
        class="glass rounded-3xl p-6 flex items-center justify-between hover:scale-[1.02] transition-all duration-300">
        
        <div>
          <h2 class="font-black text-lg uppercase italic">
            Instagram
          </h2>

          <p class="text-gray-500 text-sm">
            @pvdraizz01
          </p>
        </div>

        <i data-lucide="instagram"></i>

      </a>

    </section>

  </main>

  <!-- PLAYER -->
  <div
    id="player"
    class="fixed bottom-6 right-6 glass px-4 py-3 rounded-2xl flex items-center gap-4 cursor-move z-50">

    <button id="playBtn"
      class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center">
      
      <i data-lucide="play"></i>

    </button>

    <div>
      <p class="text-xs uppercase text-gray-500 font-bold">
        Playlist
      </p>

      <p class="font-black text-sm italic">
        Raizzx Radio
      </p>
    </div>

  </div>

  <!-- AUDIO -->
  <audio
    id="audio"
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    loop>
  </audio>

  <script>

    // ICONES
    lucide.createIcons();

    // NEVE
    const snowContainer = document.getElementById('snow-container');

    for(let i = 0; i < 50; i++) {

      const snow = document.createElement('div');

      snow.classList.add('snow');

      snow.style.left = Math.random() * window.innerWidth + 'px';

      snow.style.animationDuration = (Math.random() * 5 + 5) + 's';

      snow.style.opacity = Math.random();

      snow.style.width = snow.style.height =
        (Math.random() * 4 + 2) + 'px';

      snowContainer.appendChild(snow);
    }

    // PLAYER
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('audio');

    let isPlaying = false;

    playBtn.onclick = () => {

      if(isPlaying) {

        audio.pause();

        playBtn.innerHTML =
          '<i data-lucide="play"></i>';

      } else {

        audio.play();

        playBtn.innerHTML =
          '<i data-lucide="pause"></i>';

      }

      lucide.createIcons();

      isPlaying = !isPlaying;
    };

    // DRAG PLAYER
    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;

    player.addEventListener('mousedown', (e) => {

      isDragging = true;

      offsetX = e.clientX - player.offsetLeft;
      offsetY = e.clientY - player.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {

      if(!isDragging) return;

      player.style.left = (e.clientX - offsetX) + 'px';
      player.style.top = (e.clientY - offsetY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

  </script>

</body>
</html>
