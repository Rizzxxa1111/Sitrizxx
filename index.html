<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raizzx Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: #020202;
      overflow-x: hidden;
      font-family: sans-serif;
    }

    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .snow {
      position: fixed;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      animation: snow linear infinite;
      z-index: 1;
    }

    @keyframes snow {
      from {
        transform: translateY(-10px);
      }

      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body class="text-white">

  <!-- NEVE -->
  <div id="snow-container"></div>

  <!-- BARRA -->
  <div class="fixed top-0 left-0 right-0 bg-purple-600 py-2 text-center text-xs font-black uppercase tracking-widest z-50">
    🚀 Portal Raizzx Ativo!
  </div>

  <!-- NAVBAR -->
  <nav class="fixed top-8 left-0 right-0 bg-black/80 backdrop-blur-xl border-b border-white/10 z-40">

    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

      <div class="flex items-center gap-3">

        <div class="w-9 h-9 rounded-xl bg-purple-600 flex items-center justify-center font-black text-lg shadow-lg">
          R
        </div>

        <span class="font-black uppercase italic tracking-tight text-sm">
          Raizzx
        </span>

      </div>

      <button
        onclick="abrirLogin()"
        class="bg-purple-600 hover:bg-purple-500 transition-all px-5 py-2 rounded-xl font-black text-xs uppercase tracking-widest">
        ADM
      </button>

    </div>

  </nav>

  <!-- CONTEÚDO -->
  <main class="pt-32 pb-20 px-6 relative z-10">

    <!-- PERFIL -->
    <section class="max-w-2xl mx-auto text-center">

      <img
        id="profilePhoto"
        src="https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx"
        class="w-36 h-36 mx-auto rounded-full border-4 border-purple-600 shadow-2xl"
      />

      <h1 id="profileName" class="text-5xl font-black italic mt-8">
        Raizzx
      </h1>

      <p id="profileTitle" class="text-gray-400 mt-3 text-lg">
        Full-Stack Developer
      </p>

    </section>

    <!-- LINKS -->
    <section id="linksContainer" class="max-w-xl mx-auto mt-16 space-y-5">

      <a href="#"
        class="glass rounded-3xl p-6 flex items-center justify-between hover:scale-[1.02] transition-all duration-300">

        <div>
          <h2 class="font-black text-lg uppercase italic">
            Portfólio
          </h2>

          <p class="text-gray-500 text-sm">
            Acessar projeto
          </p>
        </div>

        <i data-lucide="external-link"></i>

      </a>

      <a href="https://instagram.com/pvdraizz01"
        target="_blank"
        class="glass rounded-3xl p-6 flex items-center justify-between hover:scale-[1.02] transition-all duration-300">

        <div>
          <h2 class="font-black text-lg uppercase italic">
            Instagram
          </h2>

          <p class="text-gray-500 text-sm">
            @pvdraizz01
          </p>
        </div>

        <i data-lucide="instagram"></i>

      </a>

    </section>

    <!-- PAINEL ADM -->
    <section
      id="adminPanel"
      style="display:none"
      class="max-w-2xl mx-auto mt-16 glass rounded-[2rem] p-8">

      <h2 class="text-3xl font-black uppercase italic mb-8">
        Painel Administrativo
      </h2>

      <div class="space-y-5">

        <div>
          <label class="text-xs uppercase text-gray-500 font-black">
            Nome
          </label>

          <input
            id="adminName"
            type="text"
            class="w-full bg-black border border-white/10 rounded-xl p-4 mt-2 outline-none"
          />
        </div>

        <div>
          <label class="text-xs uppercase text-gray-500 font-black">
            Título
          </label>

          <input
            id="adminTitle"
            type="text"
            class="w-full bg-black border border-white/10 rounded-xl p-4 mt-2 outline-none"
          />
        </div>

        <div>
          <label class="text-xs uppercase text-gray-500 font-black">
            Foto URL
          </label>

          <input
            id="adminPhoto"
            type="text"
            class="w-full bg-black border border-white/10 rounded-xl p-4 mt-2 outline-none"
          />
        </div>

        <button
          onclick="salvarAlteracoes()"
          class="w-full bg-purple-600 hover:bg-purple-500 transition-all py-4 rounded-xl font-black uppercase tracking-widest text-sm">
          Salvar Alterações
        </button>

      </div>

    </section>

  </main>

  <!-- PLAYER -->
  <div
    id="player"
    class="fixed bottom-6 right-6 glass px-4 py-3 rounded-2xl flex items-center gap-4 cursor-move z-50">

    <button
      id="playBtn"
      class="w-12 h-12 rounded-full bg-purple-600 flex items-center justify-center">

      <i data-lucide="play"></i>

    </button>

    <div>
      <p class="text-xs uppercase text-gray-500 font-black">
        Playlist
      </p>

      <p class="font-black italic text-sm">
        Raizzx Radio
      </p>
    </div>

  </div>

  <!-- AUDIO -->
  <audio
    id="audio"
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    loop>
  </audio>

  <script>

    // ICONES
    lucide.createIcons();

    // NEVE
    const snowContainer = document.getElementById('snow-container');

    for(let i = 0; i < 60; i++) {

      const snow = document.createElement('div');

      snow.classList.add('snow');

      snow.style.left = Math.random() * window.innerWidth + 'px';

      snow.style.animationDuration = (Math.random() * 5 + 5) + 's';

      snow.style.opacity = Math.random();

      snow.style.width = snow.style.height = (Math.random() * 4 + 2) + 'px';

      snowContainer.appendChild(snow);
    }

    // LOGIN ADM
    const adminUser = 'Raizzx';
    const adminPass = 'cecilia';

    function abrirLogin() {

      const user = prompt('Usuário ADM:');
      const pass = prompt('Senha ADM:');

      if(user === adminUser && pass === adminPass) {

        alert('Login realizado!');

        document.getElementById('adminPanel').style.display = 'block';

        carregarInputs();

      } else {

        alert('Credenciais incorretas');
      }
    }

    // PLAYER
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('audio');

    let tocando = false;

    playBtn.onclick = () => {

      if(tocando) {

        audio.pause();

        playBtn.innerHTML = '<i data-lucide="play"></i>';

      } else {

        audio.play();

        playBtn.innerHTML = '<i data-lucide="pause"></i>';
      }

      lucide.createIcons();

      tocando = !tocando;
    }

    // PLAYER ARRASTÁVEL
    const player = document.getElementById('player');

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    player.addEventListener('mousedown', (e) => {

      isDragging = true;

      offsetX = e.clientX - player.offsetLeft;
      offsetY = e.clientY - player.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {

      if(!isDragging) return;

      player.style.left = (e.clientX - offsetX) + 'px';
      player.style.top = (e.clientY - offsetY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // SALVAR LOCALSTORAGE
    function salvarAlteracoes() {

      const nome = document.getElementById('adminName').value;
      const titulo = document.getElementById('adminTitle').value;
      const foto = document.getElementById('adminPhoto').value;

      localStorage.setItem('raizzx_nome', nome);
      localStorage.setItem('raizzx_titulo', titulo);
      localStorage.setItem('raizzx_foto', foto);

      aplicarDados();

      alert('Alterações salvas!');
    }

    function carregarInputs() {

      document.getElementById('adminName').value = localStorage.getItem('raizzx_nome') || 'Raizzx';

      document.getElementById('adminTitle').value = localStorage.getItem('raizzx_titulo') || 'Full-Stack Developer';

      document.getElementById('adminPhoto').value = localStorage.getItem('raizzx_foto') || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx';
    }

    function aplicarDados() {

      const nome = localStorage.getItem('raizzx_nome') || 'Raizzx';

      const titulo = localStorage.getItem('raizzx_titulo') || 'Full-Stack Developer';

      const foto = localStorage.getItem('raizzx_foto') || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx';

      document.getElementById('profileName').innerText = nome;

      document.getElementById('profileTitle').innerText = titulo;

      document.getElementById('profilePhoto').src = foto;
    }

    aplicarDados();

  </script>

</body>
</html>
