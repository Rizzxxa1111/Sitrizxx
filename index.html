<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raizzx Portal</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#020202;
      overflow-x:hidden;
      font-family:sans-serif;
    }

    canvas{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .player{
      position:fixed;
      z-index:999;
      width:210px;
      background:rgba(0,0,0,.8);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:10px;
      display:flex;
      align-items:center;
      gap:12px;
      left:calc(100vw - 230px);
      top:calc(100vh - 100px);
      cursor:grab;
      user-select:none;
    }

    .player button{
      width:42px;
      height:42px;
      border-radius:999px;
      background:#9333ea;
      color:white;
      border:none;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
    }

    .broadcast{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:100;
      background:#9333ea;
      padding:10px;
      text-align:center;
      font-size:10px;
      font-weight:900;
      letter-spacing:.3em;
      text-transform:uppercase;
      color:white;
    }

    nav{
      position:fixed;
      top:40px;
      left:0;
      right:0;
      z-index:50;
      background:rgba(0,0,0,.8);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .nav-content{
      max-width:1200px;
      margin:auto;
      height:70px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo-box{
      width:35px;
      height:35px;
      border-radius:10px;
      background:#9333ea;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:white;
    }

    .hero{
      position:relative;
      z-index:10;
      padding-top:180px;
      padding-bottom:80px;
      text-align:center;
    }

    .profile{
      width:130px;
      height:130px;
      border-radius:999px;
      margin:auto;
      border:4px solid rgba(255,255,255,.1);
      object-fit:cover;
      box-shadow:0 0 40px rgba(147,51,234,.4);
    }

    .links{
      max-width:500px;
      margin:40px auto 0;
      display:flex;
      flex-direction:column;
      gap:18px;
      padding:0 20px;
    }

    .link{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      padding:18px;
      border-radius:24px;
      text-decoration:none;
      color:white;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.15em;
      transition:.3s;
      backdrop-filter:blur(10px);
    }

    .link:hover{
      transform:translateY(-3px);
      border-color:#9333ea;
      box-shadow:0 0 30px rgba(147,51,234,.2);
    }

    .admin-btn{
      margin-top:50px;
      display:inline-block;
      border:1px solid rgba(147,51,234,.4);
      padding:14px 35px;
      border-radius:999px;
      color:#9333ea;
      text-decoration:none;
      font-size:11px;
      font-weight:900;
      letter-spacing:.4em;
      text-transform:uppercase;
      transition:.3s;
    }

    .admin-btn:hover{
      background:#9333ea;
      color:white;
    }

    .login{
      display:none;
      position:relative;
      z-index:20;
      max-width:420px;
      margin:180px auto;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:40px;
      padding:40px;
      backdrop-filter:blur(20px);
    }

    .login input{
      width:100%;
      background:black;
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      padding:15px;
      color:white;
      margin-top:8px;
      outline:none;
    }

    .login button{
      width:100%;
      background:#9333ea;
      border:none;
      border-radius:14px;
      padding:15px;
      margin-top:20px;
      color:white;
      font-weight:900;
      cursor:pointer;
    }

    .admin-panel{
      display:none;
      position:relative;
      z-index:20;
      max-width:900px;
      margin:160px auto;
      padding:20px;
    }

    .card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:30px;
      backdrop-filter:blur(20px);
    }

    .admin-panel input{
      width:100%;
      background:black;
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      padding:14px;
      color:white;
      margin-top:10px;
    }

    .save-btn{
      width:100%;
      background:#9333ea;
      border:none;
      border-radius:14px;
      padding:16px;
      color:white;
      font-weight:900;
      margin-top:20px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="broadcast">
  📢 PORTAL RAIZZX ATIVO!
</div>

<nav>
  <div class="nav-content">
    <div class="logo">
      <div class="logo-box">R</div>
      <span class="text-white font-black uppercase italic tracking-wide">
        Raizzx
      </span>
    </div>

    <button onclick="openLogin()" class="text-gray-400 hover:text-white">
      ADM
    </button>
  </div>
</nav>

<canvas id="snow"></canvas>

<!-- PLAYER -->
<div class="player" id="player">
  <button id="playBtn">▶</button>

  <div>
    <p style="font-size:8px;color:#666;font-weight:900;text-transform:uppercase;">
      Playlist
    </p>

    <p style="font-size:11px;font-weight:900;font-style:italic;">
      Raizzx Radio
    </p>
  </div>
</div>

<audio 
  id="audio"
  src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  loop>
</audio>

<!-- PÚBLICO -->
<section class="hero" id="publicPage">

  <img 
    class="profile"
    src="https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx"
  />

  <h1 class="text-white text-5xl font-black italic mt-8">
    Raizzx
  </h1>

  <p class="text-gray-400 mt-3 uppercase tracking-[0.3em] text-xs">
    Full-Stack Developer
  </p>

  <div class="links">
    
    <a href="#" class="link">
      Portfólio
    </a>

    <a 
      href="https://www.instagram.com/pvdraizz01"
      target="_blank"
      class="link">
      Instagram
    </a>

  </div>

  <a href="#" onclick="openLogin()" class="admin-btn">
    Entrar ADM
  </a>

</section>

<!-- LOGIN -->
<section class="login" id="loginPage">

  <h2 class="text-white text-3xl font-black italic text-center mb-8 uppercase">
    Acesso Administrativo
  </h2>

  <input type="text" id="user" placeholder="Usuário">
  <input type="password" id="pass" placeholder="Senha">

  <button onclick="login()">
    Entrar no Sistema
  </button>

</section>

<!-- ADMIN -->
<section class="admin-panel" id="adminPage">

  <div class="card">

    <h2 class="text-white text-3xl font-black italic mb-8 uppercase">
      Painel Administrativo
    </h2>

    <label class="text-gray-500 text-xs uppercase">
      Nome
    </label>

    <input type="text" value="Raizzx">

    <label class="text-gray-500 text-xs uppercase mt-5 block">
      Subtítulo
    </label>

    <input type="text" value="Full-Stack Developer">

    <label class="text-gray-500 text-xs uppercase mt-5 block">
      URL da Foto
    </label>

    <input 
      type="text"
      value="https://api.dicebear.com/7.x/avataaars/svg?seed=Raizzx">

    <button class="save-btn">
      Salvar Alterações
    </button>

  </div>

</section>

<script>
  // LOGIN
  function openLogin(){
    document.getElementById('publicPage').style.display='none';
    document.getElementById('loginPage').style.display='block';
  }

  function login(){
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;

    if(user === 'Raizzx' && pass === 'cecilia'){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('adminPage').style.display='block';
    }else{
      alert('Credenciais incorretas');
    }
  }

  // PLAYER
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');

  playBtn.onclick = () => {
    if(audio.paused){
      audio.play();
      playBtn.innerHTML='❚❚';
    }else{
      audio.pause();
      playBtn.innerHTML='▶';
    }
  };

  // DRAG PLAYER
  const player = document.getElementById('player');

  let isDragging = false;
  let offsetX, offsetY;

  player.addEventListener('mousedown', e=>{
    isDragging = true;
    offsetX = e.clientX - player.offsetLeft;
    offsetY = e.clientY - player.offsetTop;
  });

  document.addEventListener('mousemove', e=>{
    if(!isDragging) return;

    player.style.left = (e.clientX - offsetX)+'px';
    player.style.top = (e.clientY - offsetY)+'px';
  });

  document.addEventListener('mouseup', ()=>{
    isDragging = false;
  });

  // NEVE
  const canvas = document.getElementById('snow');
  const ctx = canvas.getContext('2d');

  let w,h;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  resize();

  window.addEventListener('resize', resize);

  const snowflakes = [];

  for(let i=0;i<60;i++){
    snowflakes.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*2+1,
      s:Math.random()*1+0.3
    });
  }

  function snow(){
    ctx.clearRect(0,0,w,h);

    ctx.fillStyle='rgba(255,255,255,.15)';

    snowflakes.forEach(flake=>{
      ctx.beginPath();
      ctx.arc(flake.x,flake.y,flake.r,0,Math.PI*2);
      ctx.fill();

      flake.y += flake.s;

      if(flake.y > h){
        flake.y = -10;
        flake.x = Math.random()*w;
      }
    });

    requestAnimationFrame(snow);
  }

  snow();
</script>

</body>
</html>
